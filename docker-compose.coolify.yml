# docker-compose.coolify.yml — monorepo root
#
# Deploys BOTH the landing app (port 3000) and the docs app (port 3001) under
# a SINGLE domain using Traefik path-based routing:
#
#   https://<domain>/docs/** → docs container (port 3001)
#   https://<domain>/**      → landing container (port 3000)
#
# The docs app uses Next.js `basePath: '/docs'` so its static assets are
# served at /docs/_next/static/... and the Traefik PathPrefix rule catches
# both pages AND assets for the docs container cleanly.
#
# Coolify usage:
#   - Set SERVICE_FQDN_LANDING to your domain (e.g. holeauth.dev).
#     Coolify generates this automatically from the service configuration.
#   - Both Traefik routers reference the same variable, creating one FQDN.
#   - NEXT_PUBLIC_LANDING_URL is passed as a Docker build arg so the baked-in
#     JS bundle in the docs app knows how to link back to the landing site.

services:
  # ── Landing / Marketing site ─────────────────────────────────────────────
  landing:
    build:
      context: .
      dockerfile: apps/landing/Dockerfile
      # NEXT_PUBLIC_DOCS_URL is left empty in production because docs links
      # resolve as /docs/... on the same origin via Traefik routing.
      args:
        NEXT_PUBLIC_DOCS_URL: ""
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    labels:
      - traefik.enable=true
      - "traefik.http.routers.holeauth-landing.rule=Host(`holeauth.dev`)"
      - "traefik.http.routers.holeauth-landing.entrypoints=https"
      - "traefik.http.routers.holeauth-landing.tls=true"
      - "traefik.http.routers.holeauth-landing.tls.certresolver=letsencrypt"
      - "traefik.http.routers.holeauth-landing.priority=1"
      - "traefik.http.routers.holeauth-landing.service=holeauth-landing"
      - "traefik.http.services.holeauth-landing.loadbalancer.server.port=3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Docs / Fumadocs site ──────────────────────────────────────────────────
  docs:
    build:
      context: .
      dockerfile: apps/docs/Dockerfile
      args:
        NEXT_PUBLIC_LANDING_URL: "https://holeauth.dev"
    restart: unless-stopped
    expose:
      - "3001"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      PORT: "3001"
      HOSTNAME: "0.0.0.0"
    labels:
      - traefik.enable=true
      # PathPrefix(/docs) is more specific → Traefik gives it higher priority
      # than the Coolify-managed landing router. Next.js basePath ensures
      # /docs/_next/static/... assets also match this rule.
      - "traefik.http.routers.holeauth-docs.rule=Host(`holeauth.dev`) && PathPrefix(`/docs`)"
      - "traefik.http.routers.holeauth-docs.entrypoints=https"
      - "traefik.http.routers.holeauth-docs.tls=true"
      - "traefik.http.routers.holeauth-docs.tls.certresolver=letsencrypt"
      - "traefik.http.routers.holeauth-docs.priority=10"
      - "traefik.http.routers.holeauth-docs.service=holeauth-docs"
      - "traefik.http.services.holeauth-docs.loadbalancer.server.port=3001"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/docs/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
