# docker-compose.coolify.yml — monorepo root
#
# Deploys BOTH the landing app (port 3000) and the docs app (port 3001) under
# a SINGLE public Coolify service named `landing`.
#
# Coolify/Traefik routes https://<domain> to the `landing` nginx gateway
# container on port 80. Nginx then proxies internally:
#
#   /docs/** → docs container (port 3001)
#   /**      → landing-app container (port 3000)
#
# The docs app uses Next.js `basePath: '/docs'` so its static assets are
# served at /docs/_next/static/... and the Traefik PathPrefix rule catches
# both pages AND assets for the docs container cleanly.
#
# Coolify usage:
#   - Attach the production domain to the `landing` service only.
#   - Leave `docs` and `landing-app` without public domains.
#   - The docs app gets NEXT_PUBLIC_LANDING_URL at build time so its sidebar
#     link points back to the landing site.

services:
  # ── Public gateway ────────────────────────────────────────────────────────
  # Coolify should attach holeauth.dev to this service. It proxies internally
  # to the two Next.js standalone containers below.
  landing:
    build:
      context: .
      dockerfile: deploy/coolify/Dockerfile
    restart: unless-stopped
    expose:
      - "80"
    labels:
      - traefik.enable=true
      - "traefik.http.routers.holeauth.rule=Host(`holeauth.dev`)"
      - "traefik.http.routers.holeauth.entrypoints=https"
      - "traefik.http.routers.holeauth.tls=true"
      - "traefik.http.routers.holeauth.tls.certresolver=letsencrypt"
      - "traefik.http.routers.holeauth.priority=100"
      - "traefik.http.routers.holeauth.service=holeauth"
      - "traefik.http.services.holeauth.loadbalancer.server.port=80"
    depends_on:
      - landing-app
      - docs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Landing / Marketing site ─────────────────────────────────────────────
  landing-app:
    build:
      context: .
      dockerfile: apps/landing/Dockerfile
      args:
        NEXT_PUBLIC_DOCS_URL: ""
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Docs / Fumadocs site ──────────────────────────────────────────────────
  docs:
    build:
      context: .
      dockerfile: apps/docs/Dockerfile
      args:
        NEXT_PUBLIC_LANDING_URL: "https://holeauth.dev"
    restart: unless-stopped
    expose:
      - "3001"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      PORT: "3001"
      HOSTNAME: "0.0.0.0"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/docs/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
