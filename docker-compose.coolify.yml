# docker-compose.coolify.yml — monorepo root
#
# Deploys BOTH the landing app (port 3000) and the docs app (port 3001) under
# a SINGLE public Coolify service named `landing`.
#
# Coolify/Traefik routes https://holeauth.dev to the `landing` nginx gateway
# container on port 80. Nginx then proxies internally.

services:
  # ── Public gateway ────────────────────────────────────────────────────────
  # Coolify nutzt das Feld "Domains for landing" aus der UI, um diesen Dienst 
  # an holeauth.dev zu binden. Manuelle Labels sind hier nicht nötig.
  landing:
    build:
      context: .
      dockerfile: deploy/coolify/Dockerfile
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - landing-app
      - docs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Landing / Marketing site ─────────────────────────────────────────────
  landing-app:
    build:
      context: .
      dockerfile: apps/landing/Dockerfile
      args:
        NEXT_PUBLIC_DOCS_URL: ""
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Docs / Fumadocs site ──────────────────────────────────────────────────
  docs:
    build:
      context: .
      dockerfile: apps/docs/Dockerfile
      args:
        NEXT_PUBLIC_LANDING_URL: "https://holeauth.dev"
    restart: unless-stopped
    expose:
      - "3001"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      PORT: "3001"
      HOSTNAME: "0.0.0.0"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/docs/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s