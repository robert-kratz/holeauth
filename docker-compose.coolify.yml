# docker-compose.coolify.yml — monorepo root
#
# Deploys BOTH the landing app (port 3000) and the docs app (port 3001).
# Path routing is handled natively by Coolify's proxy via the UI.

services:
  # ── Landing / Marketing site ─────────────────────────────────────────────
  landing:
    build:
      context: .
      dockerfile: apps/landing/Dockerfile
      args:
        NEXT_PUBLIC_DOCS_URL: "https://holeauth.dev/docs"
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/',r=>process.exit(r.statusCode<400?0:1)).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Docs / Fumadocs site ──────────────────────────────────────────────────
  docs:
    build:
      context: .
      dockerfile: apps/docs/Dockerfile
      args:
        NEXT_PUBLIC_LANDING_URL: "https://holeauth.dev"
    restart: unless-stopped
    expose:
      - "3001"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      PORT: "3001"
      HOSTNAME: "0.0.0.0"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3001/docs/',r=>process.exit(r.statusCode<400?0:1)).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s