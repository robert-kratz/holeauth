name: Snapshot

# Publishes a one-off snapshot version from any PR branch.
# Trigger: add the label "snapshot" to a PR, or dispatch manually.
#
# Published tag on npm:  pr-<number>
# Version format:        0.0.1-alpha-<timestamp>.0
#
# Usage after publish:
#   pnpm add @holeauth/core@pr-42

on:
  pull_request:
    types: [labeled]
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number (used as the npm dist-tag)
        required: true
        type: string

concurrency:
  group: snapshot-${{ github.ref }}
  cancel-in-progress: true

jobs:
  snapshot:
    name: Publish snapshot
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.label.name == 'snapshot'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # npm provenance
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with: { version: 9 }

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm turbo run build --filter=./packages/*

      - name: Resolve PR number
        id: pr
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "number=${{ inputs.pr_number }}" >> "$GITHUB_OUTPUT"
          else
            echo "number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Version snapshot
        run: pnpm changeset version --snapshot "pr-${{ steps.pr.outputs.number }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish snapshot
        run: pnpm changeset publish --tag "pr-${{ steps.pr.outputs.number }}" --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const tag = `pr-${{ steps.pr.outputs.number }}`;
            const packages = [
              "@holeauth/core",
              "@holeauth/adapter-drizzle",
              "@holeauth/nextjs",
              "@holeauth/react",
              "@holeauth/plugin-2fa",
              "@holeauth/plugin-rbac",
              "@holeauth/plugin-passkey",
              "@holeauth/plugin-idp",
              "@holeauth/2fa-drizzle",
              "@holeauth/rbac-drizzle",
              "@holeauth/passkey-drizzle",
              "@holeauth/idp-drizzle",
              "@holeauth/rbac-yaml",
            ];
            const lines = packages.map(p => `  ${p}@${tag}`).join("\n");
            const body = [
              `📦 **Snapshot published** — tag \`${tag}\``,
              "",
              "Install with:",
              "```sh",
              `pnpm add \\`,
              lines,
              "```",
            ].join("\n");
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.pr.outputs.number }},
              body,
            });
