services:
  docs:
    build:
      # Build context must be the monorepo root so pnpm can resolve workspace packages.
      context: ../..
      dockerfile: apps/docs/Dockerfile
      # NEXT_PUBLIC_* vars are inlined into the JS bundle at build time.
      # They must be passed as build args, not runtime environment variables.
      args:
        NEXT_PUBLIC_LANDING_URL: "${NEXT_PUBLIC_LANDING_URL:-https://holeauth.dev}"
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      PORT: "3001"
      HOSTNAME: "0.0.0.0"
    labels:
      - traefik.enable=true
      - traefik.http.routers.docs.rule=Host(`${SERVICE_FQDN_DOCS_3001}`)
      - traefik.http.routers.docs.entrypoints=https
      - traefik.http.routers.docs.tls=true
      - traefik.http.routers.docs.tls.certresolver=letsencrypt
      - traefik.http.services.docs.loadbalancer.server.port=3001
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
